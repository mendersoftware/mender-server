openapi: 3.0.1
info:
  description: |
    An API for device attribute management and device grouping. Intended for use by the web GUI.

    Devices can upload vendor-specific attributes (software/hardware info, health checks, metrics, etc.) of various data types to the backend.

    This API enables the user to:
    * list devices with their attributes
    * search devices by attribute value
    * use the results to create and manage device groups for the purpose of deployment scheduling
  title: Device inventory
  version: "1"
servers:
- url: https://hosted.mender.io/api/management/v1/inventory
paths:
  /devices:
    get:
      description: |
        Returns a paged collection of devices and their attributes.
        Accepts optional search and sort parameters.

        **Searching**
        Searching by attributes values is accomplished by appending attribute
        name/value pairs to the query string, e.g.:
        `GET /devices?attr_name_1=foo&attr_name_2=100`
      operationId: List Device Inventories
      parameters:
      - description: Starting page.
        in: query
        name: page
        schema:
          default: 1.0
          format: integer
          type: number
      - description: Maximum number of results per page.
        in: query
        name: per_page
        schema:
          default: 10.0
          format: integer
          type: number
      - description: |
          Sort devices by attribute.
          The parameter is formatted as a comma-separated list of attribute
          names and sort order.

          The order direction (`ord`) must be either `asc` or `desc` for
          ascending and descending respectively.
          Defaults to `desc` if not specified.

          For example: `?sort=attr1:asc,attr2:desc`
          will sort by 'attr1' ascending, and then by 'attr2' descending.
        in: query
        name: sort
        schema:
          format: "attr[:ord][,attr[:ord]...]"
          type: string
      - description: Limit result to devices assigned to a group.
        in: query
        name: has_group
        schema:
          type: boolean
      - description: Limits result to devices in the given group.
        in: query
        name: group
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              example:
              - id: 291ae0e5956c69c2267489213df4459d19ed48a806603def19d417d004a4b67e
                attributes:
                - name: ip_addr
                  scope: inventory
                  value: 1.2.3.4
                  description: IP address
                - name: mac_addr
                  scope: inventory
                  value: 00.01:02:03:04:05
                  description: MAC address
                updated_ts: 2016-10-03T16:58:51.639Z
              - id: 76f40e5956c699e327489213df4459d1923e1a806603def19d417d004a4a3ef
                attributes:
                - name: mac
                  scope: inventory
                  value: 00:01:02:03:04:05
                  description: MAC address
                updated_ts: 2016-10-04T18:24:21.432Z
              schema:
                items:
                  $ref: '#/components/schemas/DeviceInventory'
                title: ListOfDevices
                type: array
          description: Successful response.
          headers:
            X-Total-Count:
              description: Total number of devices found
              schema:
                type: string
            Link:
              description: |
                Standard page navigation header, supported relations: 'first', 'next', and 'prev'.
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Missing or malformed request parameters.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal error.
      security:
      - ManagementJWT: []
      summary: List devices inventories
      tags:
      - Management API
  /devices/{id}:
    delete:
      operationId: Delete Device Inventory
      parameters:
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: Device removed
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Remove selected device's inventory
      tags:
      - Management API
    get:
      operationId: Get Device Inventory
      parameters:
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              example:
                id: 291ae0e5956c69c2267489213df4459d19ed48a806603def19d417d004a4b67e
                attributes:
                - name: ip_addr
                  scope: inventory
                  value: 1.2.3.4
                  description: IP address
                - name: mac_addr
                  scope: inventory
                  value: 00.01:02:03:04:05
                  description: MAC address
                - name: environment
                  scope: tags
                  value: test
                  description: Test environment
                  timestamp: 2016-10-19T17:23:01.639Z
                updated_ts: 2016-10-03T16:58:51.639Z
              schema:
                $ref: '#/components/schemas/DeviceInventory'
          description: Successful response - the device was found.
          headers:
            ETag:
              description: |
                Contains the device object's current ETag.
                Applicable only to attributes with 'tags' scope, changing other attributes doesn't affect the ETag.
              schema:
                type: string
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Get a selected device's inventory
      tags:
      - Management API
  /devices/{id}/tags:
    patch:
      description: |
        Saves the provided tags set for the authenticated device.

        This method has upsert semantic:
        * it overwrites the values of existing attributes
        * it creates attributes assigned for the first time
      operationId: Add Tags
      parameters:
      - description: "Contains the device object's current ETag, and performs the\
          \ update only if it matches the one stored in the database."
        in: header
        name: If-Match
        schema:
          type: string
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              example:
              - name: location
                value: germany
                description: Germany region
              - name: environment
                value: test
              items:
                $ref: '#/components/schemas/Tag'
              title: ListOfTags
              type: array
        description: A list of tag descriptors.
        required: true
      responses:
        "200":
          content: {}
          description: Tags were updated successfully.
        "400":
          content: {}
          description: Missing or malformed request params or body. See the error
            message for details.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found.
        "412":
          content: {}
          description: ETag doesn't match.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Adds a set of tags for a device
      tags:
      - Management API
    put:
      description: |
        Replaces the tags associated to the device.

        This method replaces all the tags with the new set:
        * it removes from the db the attributes not provided
        * it overwrites the values of existing attributes
        * it creates attributes assigned for the first time
      operationId: Assign Tags
      parameters:
      - description: "Contains the device object's current ETag, and performs the\
          \ update only if it matches the one stored in the database."
        in: header
        name: If-Match
        schema:
          type: string
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              example:
              - name: location
                value: germany
                description: Germany region
              - name: environment
                value: test
              items:
                $ref: '#/components/schemas/Tag'
              title: ListOfTags
              type: array
        description: A list of tags descriptors.
        required: true
      responses:
        "200":
          content: {}
          description: Tags were updated successfully.
        "400":
          content: {}
          description: Missing or malformed request params or body. See the error
            message for details.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found.
        "412":
          content: {}
          description: ETag doesn't match.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Replace the set of tags for a device
      tags:
      - Management API
  /devices/{id}/group:
    get:
      operationId: Get Device Group
      parameters:
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: |
            Successful response. If the device is not assigned to any group, the 'group' field will be set to 'null'.
        "400":
          content: {}
          description: Missing or malformed request params or body. See the error
            message for details.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Get a selected device's group
      tags:
      - Management API
    put:
      description: |
        Adds a device to a group.

        Note that a given device can belong to at most one group.
        If a device already belongs to some group, it will be moved
        to the selected one.
      operationId: Assign Group
      parameters:
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
        description: Group descriptor.
        required: true
      responses:
        "204":
          content: {}
          description: Success - the device was added to the group.
        "400":
          content: {}
          description: Missing or malformed request params or body. See the error
            message for details.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Add a device to a group
      tags:
      - Management API
  /devices/{id}/group/{name}:
    delete:
      description: |
        Removes the device with identifier 'id' from the group 'group'.
      operationId: Clear Group
      parameters:
      - description: Device identifier.
        in: path
        name: id
        required: true
        schema:
          type: string
      - description: Group name.
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "204":
          content: {}
          description: The device was successfully removed from the group.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The device was not found or doesn't belong to the group.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal error.
      security:
      - ManagementJWT: []
      summary: Remove a device from a group
      tags:
      - Management API
  /groups:
    get:
      operationId: List Groups
      parameters:
      - description: Show groups for devices with the given auth set status.
        in: query
        name: status
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              example:
              - staging
              - testing
              - production
              schema:
                items:
                  description: Group name
                  title: ListOfGroupNames
                  type: string
                type: array
          description: Successful response.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: List all groups existing device groups
      tags:
      - Management API
  /groups/{name}:
    delete:
      description: |
        Removes a device group. This API provides a bulk alternative to
        DELETE /devices/{id}/group/{name} for managing device groups.
      operationId: Remove a Group
      parameters:
      - description: Group name.
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              example:
                updated_count: 2
              schema:
                $ref: '#/components/schemas/Remove_a_Group_200_response'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid request schema.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The group was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Remove a device group
      tags:
      - Management API
  /groups/{name}/devices:
    delete:
      description: |
        Removes a list of devices from the specified group.
      operationId: Remove Devices from Group
      parameters:
      - description: Group name.
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: JSON list of device IDs to remove from the group.
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                updated_count: 2
              schema:
                $ref: '#/components/schemas/Remove_a_Group_200_response'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid request schema.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The group was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Clear devices' group
      tags:
      - Management API
    get:
      operationId: Get Devices in Group
      parameters:
      - description: Starting page.
        in: query
        name: page
        schema:
          default: 1
          type: integer
      - description: Maximum number of results per page.
        in: query
        name: per_page
        schema:
          default: 10
          type: integer
      - description: Group name.
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                title: ListOfIDs
                type: array
          description: Successful response
          headers:
            X-Total-Count:
              description: Custom header indicating the total number of devices in
                the given group
              schema:
                type: string
            Link:
              description: "Standard header, we support 'first', 'next', and 'prev'."
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid request parameters.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The group was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: List the devices belonging to a given group
      tags:
      - Management API
    patch:
      description: |
        Appends the list of devices in the request body to the given group.
        For devices already present in the group the operation has no effect.
      operationId: Add Devices to Group
      parameters:
      - description: Group name.
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        description: JSON list of device IDs to append to the group.
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                updated_count: 2
                matched_count: 3
              schema:
                $ref: '#/components/schemas/Add_Devices_to_Group_200_response'
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Invalid request schema.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: The group was not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: Internal server error.
      security:
      - ManagementJWT: []
      summary: Add devices to group
      tags:
      - Management API
components:
  schemas:
    Attribute:
      description: Attribute descriptor.
      example:
        name: ip_addr_eth
        description: Device IP address on ethernet interface
        value: 127.0.0.1
        timestamp: 2016-10-19T17:23:01.639Z
        scope: inventory
      properties:
        name:
          description: |
            A human readable, unique attribute ID, e.g. 'device_type', 'ip_addr', 'cpu_load', etc.
          type: string
        scope:
          description: |
            The scope of the attribute.

            Scope is a string and acts as namespace for the attribute name.
          type: string
        description:
          description: Attribute description.
          type: string
        value:
          description: |
            The current value of the attribute.

            Attribute type is implicit, inferred from the JSON type.

            Supported types: number, string, array of numbers, array of strings.
            Mixed type arrays are not allowed.
          type: string
        timestamp:
          description: |
            The date and time of last tag update in RFC3339 format.
          format: date-time
          type: string
      required:
      - name
      - scope
      - value
      type: object
    Tag:
      description: Tag descriptor.
      example:
        name: environment
        description: Test environment
        value: test
        timestamp: 2016-10-19T17:23:01.639Z
      properties:
        name:
          description: |
            Tag is an attribute with 'tags' scope.

            A human readable, unique tag ID, e.g. 'location', 'environment', etc.
          type: string
        description:
          description: Tag description.
          type: string
        value:
          description: The current value of the tag.
          type: string
        timestamp:
          description: |
            The date and time of last tag update in RFC3339 format.
          format: date-time
          type: string
      required:
      - name
      - value
      type: object
    DeviceInventory:
      example:
        id: 291ae0e5956c69c2267489213df4459d19ed48a806603def19d417d004a4b67e
        attributes:
        - name: ip_addr
          value: 1.2.3.4
          description: IP address
          scope: inventory
        - name: mac_addr
          value: 00.01:02:03:04:05
          description: MAC address
          scope: inventory
        updated_ts: 2016-10-03T16:58:51.639Z
      properties:
        id:
          description: Mender-assigned unique device ID.
          type: string
        updated_ts:
          description: Timestamp of the most recent attribute update.
          type: string
        attributes:
          description: A list of attribute descriptors.
          items:
            $ref: '#/components/schemas/Attribute'
          type: array
      type: object
    Group:
      example:
        group: staging
      properties:
        group:
          description: Device group.
          type: string
      required:
      - group
      type: object
    Error:
      description: Error descriptor.
      example:
        error: "failed to decode device group data: JSON payload is empty"
        request_id: f7881e82-0492-49fb-b459-795654e7188a
      properties:
        error:
          description: Description of the error.
          type: string
        request_id:
          description: Request ID (same as in X-MEN-RequestID header).
          type: string
      type: object
    Remove_a_Group_200_response:
      description: |
        JSON object listing how many devices were updated.
      example:
        updated_count: 0.8008281904610115
      properties:
        updated_count:
          description: |
            Number of devices for which the group was cleared sucessfully.
          type: number
      required:
      - updated_count
      type: object
    Add_Devices_to_Group_200_response:
      description: |
        JSON object listing how many devices were updated.
      example:
        matched_count: 6.027456183070403
        updated_count: 0.8008281904610115
      properties:
        updated_count:
          description: |
            Number of devices listed that changed group.
          type: number
        matched_count:
          description: |
            Number of devices listed that matched a valid device id internally.
          type: number
      required:
      - matched_count
      - updated_count
      type: object
  securitySchemes:
    ManagementJWT:
      description: |
        API token issued by User Authentication service.
        Format: 'Bearer [JWT]'
      in: header
      name: Authorization
      type: apiKey
