openapi: 3.0.1
info:
  description: |
    Experimental API for deployments management.
    These endpoints are subject to change and may be removed in future versions.
  title: Deployments v1alpha1
  version: v1alpha1
tags:
  - name: Management API
paths:
  /api/management/v1alpha1/deployments/software:
    get:
      description: |-
        Returns software information according to the specified parameters.
        "Software" in this context refers to base information shared across both Releases and Manifests.
        Note that the operation between the `name` and `kind` parameters is an AND operation.
      operationId: Get Deployment Software
      parameters:
        - description: Software name filter. Can be repeated to query a set of entries. Mutually exclusive with `name_prefix`.
          in: query
          name: name
          explode: true
          style: form
          schema:
            items:
              type: string
            type: array
        - description: Software name prefix filter. Mutually exclusive with `name`.
          in: query
          name: name_prefix
          schema:
            type: string
        - description: Software kind filter.
          in: query
          name: kind
          schema:
            enum:
              - release
              - manifest
            type: string
        - description: Update type filter.
          in: query
          name: update_type
          schema:
            type: string
        - description: Starting page.
          in: query
          name: page
          schema:
            default: 1.0
            type: integer
        - description: Maximum number of results per page.
          in: query
          name: per_page
          schema:
            default: 20.0
            maximum: 500
            type: integer
        - description: |-
            Sort the Software list by the specified field and direction.
          in: query
          name: sort
          schema:
            default: name:asc
            enum:
            - modified:asc
            - modified:desc
            - name:asc
            - name:desc
            - tags:asc
            - tags:desc
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Software'
          description: |-
            A successful response including the Software information
          headers:
            X-Total-Count:
              description: Total number of Software matching query.
              schema:
                type: integer 
            Link:
              description: "Standard header, we support 'first', 'next', and 'prev'."
              schema:
                type: string
        "400":
          $ref: '../common/responses.yaml#/components/responses/InvalidRequestError'
        "401":
          $ref: '../common/responses.yaml#/components/responses/UnauthorizedError'
        "500":
          $ref: '../common/responses.yaml#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
      summary: Get Mender Software
      tags:
      - Management API
  /api/management/v1alpha1/deployments/software/tags:
    get:
      operationId: List software tags
      parameters:
        - description: |-
            Only list tags used on software of a particular kind
          in: query
          name: kind
          schema:
            enum:
              - release
              - manifest
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: './schemas.yaml#/components/schemas/Tags'
          description: Successful response.
        "400":
          $ref: '../common/responses.yaml#/components/responses/InvalidRequestError'
        "401":
          $ref: '../common/responses.yaml#/components/responses/UnauthorizedError'
        "500":
          $ref: '../common/responses.yaml#/components/responses/InternalServerError'
      security:
        - ManagementJWT: []
      summary: |
        Lists all available tags for software (releases and/or manifests).
      tags:
        - Management API
components:
  securitySchemes:
    ManagementJWT:
      $ref: '../common/securitySchemes.yaml#/components/securitySchemes/ManagementJWT'
  schemas:
     Software:
      description: |-
        Software information representing either a Release or a Manifest.
        Contains only the shared attributes common to both kinds.
      required:
        - name
        - kind
      properties:
        name:
          description: The name of the Software.
          type: string
        modified:
          description: Last modification time for the Software.
          format: date-time
          type: string
        kind:
          enum:
            - release
            - manifest
          type: string
        tags:
          description: |-
            Tags assigned to the Software used for filtering. Each tag
            must be valid a ASCII string and contain only lowercase and uppercase
            letters, digits, underscores, periods and hyphens.
          items:
            type: string
          type: array
        notes:
          description: |
            Additional information describing a Software limited to 1024 characters.
          type: string
      example:
        name: system-core-v1
        modified: 2026-05-17T08:56:52.063493443Z
        kind: release
        tags:
          - system-core
          - demo
        notes: This is a demo manifest/release used for documentation purposes.
      type: object