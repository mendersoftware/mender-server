# the "mender-server/pkg"of the api spec
openapi: 3.0.1
info:
  title: Common Schemas
  version: "1.0"
  description: Shared schemas used across API specifications
paths: {}
components:
  schemas:
    Attribute:
      description: Attribute descriptor.
      example:
        name: ip_addr_eth
        description: Device IP address on ethernet interface
        value: 127.0.0.1
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
          description: |
            A human readable, unique attribute ID, e.g. 'device_type', 'ip_addr', 'cpu_load', etc.
        description:
          type: string
          description: Attribute description.
        value:
          oneOf:
            - type: string
            - type: number
            - type: array
              items:
                type: string
            - type: array
              items:
                type: number
          description: |
            The current value of the attribute.

            Attribute type is implicit, inferred from the JSON type.

            Supported types: number, string, array of numbers, array of strings.
            Mixed type arrays are not allowed.
    AttributeV2:
      description: Attribute descriptor with scope (v2 APIs).
      example:
        name: serial_no
        scope: inventory
        description: Serial number
        value: "123456789"
      required:
        - name
        - scope
        - value
      type: object
      properties:
        name:
          type: string
          description: |
            A human readable, unique attribute ID, e.g. 'device_type', 'ip_addr', 'cpu_load', etc.
        scope:
          $ref: '../common/schemas.yaml#/components/schemas/Scope'
        description:
          type: string
          description: Attribute description.
        value:
          $ref: "#/components/schemas/AttributeValue"
    AttributeValue:
      oneOf:
        - type: string
        - type: number
        - type: array
          items:
            type: string
        - type: array
          items:
            type: number
      description: |
        The current value of the attribute.

        Attribute type is implicit, inferred from the JSON type.

        Supported types: number, string, array of numbers, array of strings.
        Mixed arrays are not allowed.

    SortCriteria:
      description: Sort criteria definition
      example:
        attribute: serial_no
        scope: inventory
        order: asc
      required:
        - attribute
        - order
        - scope
      type: object
      properties:
        attribute:
          type: string
          description: Attribute name.
        scope:
          $ref: '../common/schemas.yaml#/components/schemas/Scope'
        order:
          type: string
          description: Sort order.
          enum:
            - asc
            - desc
    FilterPredicate:
      required:
      - attribute
      - scope
      - type
      - value
      type: object
      properties:
        scope:
          $ref: '../common/schemas.yaml#/components/schemas/Scope'
        attribute:
          type: string
          description: |
            Name of the attribute to be queried for filtering.
        type:
          type: string
          description: Type or operator of the filter predicate.
          enum:
          - $eq
          - $in
          - $nin
        value:
          allOf:
            - $ref: "#/components/schemas/AttributeValue"
            - description: |
                The value of the attribute to be used in filtering.

                Attribute type is implicit, inferred from the JSON type.

                Supported types: number, string, array of numbers, array of strings.
                Mixed arrays are not allowed.

                The $exists operator expects a boolean value: true means the specified
                attribute exists, false means the specified attribute doesn't exist.

                The $regex operator expects a string as a Perl compatible regular expression
                (PCRE), automatically anchored by ^. If the regular expression is not valid,
                the filter will produce no results. If you need to specify options and flags,
                you can provide the full regex in the format of /regex/flags, for example
                `/[a-z]+/i`.
      description: Attribute filter predicate
      example:
        type: $eq
        attribute: serial_no
        scope: inventory
        value: "123456789"
    DeviceStatusStatistics:
      type: object
      description: Device statistics grouped by device status
      required:
        - accepted
        - pending
      properties:
        accepted:
          $ref: '#/components/schemas/DeviceCountByTier'
        pending:
          $ref: '#/components/schemas/DeviceCountByTier'
      example:
        accepted:
          standard: 975
          micro: 3546
          system: 0
        pending:
          standard: 2
          micro: 30
          system: 1
    DeviceCountByTier:
      description: Number of devices per tier
      type: object
      required:
        - standard
        - micro
        - system
      properties:
        standard:
          type: integer
        micro:
          type: integer
        system:
          type: integer
    DeviceInventory:
      type: object
      properties:
        id:
          type: string
          description: Mender-assigned unique ID.
        updated_ts:
          type: string
          description: Timestamp of the most recent attribute update.
        attributes:
          type: array
          description: A list of attribute descriptors.
          items:
            $ref: "./schemas.yaml#/components/schemas/AttributeV2"
      example:
        id: 291ae0e5956c69c2267489213df4459d19ed48a806603def19d417d004a4b67e
        attributes:
          - name: ip_addr
            scope: inventory
            value: 1.2.3.4
            description: IP address
          - name: mac_addr
            scope: inventory
            value: 00.01:02:03:04:05
            description: MAC address
        updated_ts: 2016-10-03T16:58:51.639Z
    SearchParams:
      type: object
      properties:
        page:
          type: integer
          description: Starting page.
        per_page:
          type: integer
          description: Number of results per page.
        device_ids:
          type: array
          description: List of device IDs
          items:
            type: string
            description: Attribute filter predicate
        text:
          type: string
          description: Free-text search query
        filters:
          type: array
          description: "List of filter predicates, chained with boolean AND\
            \ operators to build the search condition definition."
          items:
            $ref: "#/components/schemas/FilterPredicate"
        sort:
          type: array
          description: List of ordered sort criterias
          items:
            $ref: "#/components/schemas/SortCriteria"
        attributes:
          type: array
          description: List of attributes to select and return
          items:
            $ref: "#/components/schemas/SelectAttribute"
    SelectAttribute:
      required:
        - attribute
        - scope
      type: object
      properties:
        attribute:
          type: string
          description: Attribute name.
        scope:
          $ref: "../common/schemas.yaml#/components/schemas/Scope"
      description: Inventory attribute
      example:
        attribute: serial_no
        scope: inventory
