services:
  gui-tests-runner:
    volumes:
      - ${GUI_REPOSITORY}/tests/e2e_tests/playwright-qemu.config.ts:/e2e/playwright-qemu.config.ts

  client:
    image: mendersoftware/mender-client-qemu-rofs:mender-master
    environment:
      - SERVER_URL=https://docker.mender.io
      - TENANT_TOKEN
    ports:
      - '8822:8822'
